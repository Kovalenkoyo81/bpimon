name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: vet
        run: go vet ./...

      - name: test
        run: go test ./...

      - name: build (linux/amd64)
        run: go build -o bpimon_amd64 ./cmd/bpimon

      - name: build (linux/arm64)
        run: GOOS=linux GOARCH=arm64 go build -o bpimon_arm64 ./cmd/bpimon

      - name: build (linux/arm v7)
        run: GOOS=linux GOARCH=arm GOARM=7 go build -o bpimon_armv7 ./cmd/bpimon

      - name: build (linux/arm v6)
        run: GOOS=linux GOARCH=arm GOARM=6 go build -o bpimon_armv6 ./cmd/bpimon
